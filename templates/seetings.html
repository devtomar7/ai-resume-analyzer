<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0f172a; color:white;">

<div class="d-flex">

    <!-- Sidebar -->
    <div style="width:220px; height:100vh; background:#020617; padding:20px;">
        <h4>🚀 Resume AI</h4>

        <a href="/" class="d-block text-white mt-4">🏠 Dashboard</a>
        <a href="/analyze" class="d-block text-white mt-3">📄 Analyze</a>
        <a href="/history" class="d-block text-white mt-3">📊 Reports</a>
        <a href="/settings" class="d-block text-info mt-3">⚙️ Settings</a>
        <a href="/logout" class="d-block text-danger mt-3">🚪 Logout</a>
    </div>

    <!-- Content -->
    <div class="p-5 w-100">
        <h2>⚙️ Settings</h2>

        <div class="card p-4 mt-4">
            <h5>👤 User Info</h5>
            <p>Username: {{ current_user.id }}</p>

            <hr>

            <h5>🎨 Theme</h5>
            <button class="btn btn-light" onclick="toggleMode()">Toggle Dark/Light</button>
        </div>
    </div>

</div>

<script>
function toggleMode() {
    document.body.style.background = "white";
    document.body.style.color = "black";
}
</script>

</body>
</html>
